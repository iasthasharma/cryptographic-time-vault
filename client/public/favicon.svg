  <!-- Lock Shackle -->
  <path d="M35 45V35C35 25 42 18 50 18C58 18 65 25 65 35V45" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"></path>

  <!-- Clock Hand -->
  <line x1="50" y1="58" x2="50" y2="48" stroke="#111827" stroke-width="4" stroke-linecap="round"></line>
  <line x1="50" y1="58" x2="58" y2="62" stroke="#111827" stroke-width="4" stroke-linecap="round"></line>
</svg>