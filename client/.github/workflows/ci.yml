name: Vaultix CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # STEP 1: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # STEP 2: Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # ======================
      # SERVER INSTALL + CHECK
      # ======================
      - name: Install Server Dependencies
        working-directory: ./server
        run: npm install

      - name: Server Basic Check
        working-directory: ./server
        run: node -e "console.log('Server OK')"

      # ======================
      # CLIENT INSTALL + BUILD
      # ======================
      - name: Install Client Dependencies
        working-directory: ./client
        run: npm install

      - name: Build React App
        working-directory: ./client
        run: npm run build

      # ======================
      # SUCCESS MESSAGE
      # ======================
      - name: CI Completed
        run: echo "Vaultix CI pipeline completed successfully"